<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Love Confession 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Card utama */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
}

/* Input & button */
input, button {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 12px;
    border: none;
    outline: none;
}

button {
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1e4d;
    transform: scale(1.05);
}

/* Teks surat */
#surat {
    margin-top: 15px;
    font-size: 16px;
    white-space: pre-line;
    color: #fff;
    text-shadow: 0 0 10px #ff4d6d;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
    <h2>💖 Love Confession 💖</h2>

    <input type="text" id="namaKamu" placeholder="Nama kamu">
    <input type="text" id="namaPacar" placeholder="Nama dia ❤️">

    <button onclick="mulai()">Mulai 💌</button>
    <button onclick="surprise()">Surprise 🎁</button>

    <div id="surat"></div>
</div>

<script>
// efek ketik
function mulai() {
    let kamu = document.getElementById("namaKamu").value;
    let dia = document.getElementById("namaPacar").value;

    let text = `Hai ${dia} ❤️
Aku cuma mau jujur...

Sejak ada kamu,
hidupku jadi lebih berwarna 🌸

Aku nggak sempurna,
tapi aku akan usahakan apapun tentangmu 💖

Aku sayang kamu 😄

- ${kamu}`;

    let i = 0;
    let output = document.getElementById("surat");
    output.innerHTML = "";

    let interval = setInterval(() => {
        output.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 35);
}

// popup lucu
function surprise() {
    alert("Aku sayang kamu banget 💖🥺");
}

// floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
